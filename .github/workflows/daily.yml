name: Daily Lundin Mining Report

on:
  schedule:
    - cron: "0 5 * * *"  # 07:00 svensk tid (UTC+2 ≈ 05:00 UTC)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: python main.py
